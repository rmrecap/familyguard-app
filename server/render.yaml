services:
  - type: web
    name: familyguard-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: familyguard-db
          property: connectionString
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: HMAC_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://familyguard.app

databases:
  - name: familyguard-db
    plan: free
    databaseName: familyguard
    user: familyguard_user
